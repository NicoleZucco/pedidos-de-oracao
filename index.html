<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="image/oracao.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Pedidos de Oração</title>
</head>

<body>

    <main class="container">

        <h1 class="titulo">🙏 Pedidos de Oração</h1>

        <p class="versiculo">"Clama a mim, e responder-te-ei." - Jeremias 33:3</p>

        <form class="formulario">

            <label class="texto" for="nome"><b>Seu nome</b></label>
            <input class="caixa-texto-nome" type="text" id="nome" placeholder="Digite seu nome">

            <label class="texto" for="pedido"><b>Pedido de oração</b></label>
            <textarea class="caixa-texto" id="pedido" placeholder="Escreva seu pedido aqui..."></textarea>

            <button class="botao"><b>Enviar pedido</b></button>

        </form>

    </main>






</body>
</html>
